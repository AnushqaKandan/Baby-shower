<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <link rel="stylesheet" href="./css/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fbc8da;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .thankyou-card {
            background: rgba(255,255,255,0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 15px;
            color: #c99d74;
        }

        p {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            background: #c99d74;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
        }

        a:hover {
            background: #b6895e;
        }
    </style>
</head>

<body>

    <div class="thankyou-card">
        <h1>Thank you 💕</h1>
        <p>Your RSVP has been received. We can't wait to see you!</p>

        <a href="index.html">Back to invite</a>
    </div>

</body>
</html>
